<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharath Reddy M</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">
        <!-- Top Cover Graphic -->
        <div class="profile-cover"></div>
        
        <!-- Profile Main Content -->
        <div class="profile-content">
            <img src="https://unsplash.com" alt="Alex Morgan" class="profile-avatar">
            
            <h2 class="profile-name">Bharath Reddy M</h2>
            <p class="profile-title">Senior UI/UX Designer</p>
            <p class="profile-bio">Crafting clean digital experiences and modern brand identities. Based in San Francisco, CA.</p>
            
            <!-- Engagement Statistics -->
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-number">12.5k</span>
                    <span class="stat-label">Followers</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">482</span>
                    <span class="stat-label">Following</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number">94</span>
                    <span class="stat-label">Projects</span>
                </div>
            </div>
            
            <!-- Call to Actions -->
            <div class="profile-actions">
                <button class="btn btn-primary">Follow</button>
                <button class="btn btn-secondary">Message</button>
            </div>
        </div>
    </div>

</body>
</html>
